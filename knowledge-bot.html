<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Bot</title>
<style>
.gandhi-bot-btn {
    position: fixed; bottom: 25px; right: 25px;
    width: 60px; height: 60px; background: #27ae60;
    border: none; border-radius: 50%; font-size: 28px;
    cursor: pointer; z-index: 2147483647;
    box-shadow: 0 4px 20px rgba(39,174,96,0.5);
    display: flex; align-items: center; justify-content: center;
}
.gandhi-bot-window {
    position: fixed; bottom: 100px; right: 25px;
    width: 370px; height: 500px; background: white;
    border-radius: 15px; box-shadow: 0 10px 50px rgba(0,0,0,0.3);
    display: none; flex-direction: column; z-index: 2147483646;
    font-family: Arial, sans-serif; overflow: hidden;
}
.gandhi-bot-window.open { display: flex; }
.gandhi-bot-header {
    background: linear-gradient(135deg, #2c3e50, #8b4513);
    color: white; padding: 14px;
    display: flex; align-items: center; gap: 10px;
}
.gandhi-bot-messages {
    flex: 1; overflow-y: auto; padding: 15px;
    background: #f9f7f2;
}
.gandhi-bot-msg {
    max-width: 85%; padding: 10px 14px; border-radius: 15px;
    margin: 5px 0; font-size: 13px; line-height: 1.5; word-wrap: break-word;
}
.gandhi-bot-msg.bot { background: white; border: 1px solid #e0d5c0; }
.gandhi-bot-msg.user { background: #27ae60; color: white; margin-left: auto; }
.gandhi-bot-msg .src { margin-top: 8px; padding-top: 6px; border-top: 1px solid #ddd; font-size: 10px; color: #888; }
.gandhi-bot-typing { display: flex; gap: 4px; padding: 10px; }
.gandhi-bot-typing span { width: 7px; height: 7px; background: #bbb; border-radius: 50%; animation: bounce 1.4s infinite; }
.gandhi-bot-typing span:nth-child(2) { animation-delay: 0.2s; }
.gandhi-bot-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
.gandhi-bot-input {
    padding: 10px; border-top: 1px solid #eee;
    display: flex; gap: 6px; background: white; align-items: center;
}
.gandhi-bot-input input {
    flex: 1; padding: 10px 12px; border: 2px solid #ddd;
    border-radius: 20px; outline: none; font-size: 13px;
}
.gandhi-bot-input button {
    padding: 10px 16px; background: #27ae60; color: white;
    border: none; border-radius: 20px; cursor: pointer; font-weight: bold;
}
.gandhi-bot-suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; }
.gandhi-bot-suggestions button {
    padding: 6px 12px; background: #f0e6d3; border: 1px solid #d4c5a0;
    border-radius: 15px; cursor: pointer; font-size: 11px; color: #5c3d0e;
}
.gandhi-bot-branding { text-align: center; padding: 6px; font-size: 9px; color: #bbb; background: #f9f9f9; }
@media (max-width: 450px) { .gandhi-bot-window { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; } }
</style>
</head>
<body>

<button class="gandhi-bot-btn" onclick="gandhiBot.toggle()">🕊️</button>

<div class="gandhi-bot-window" id="gandhiBotWindow">
    <div class="gandhi-bot-header">
        <span>🕊️</span>
        <div><b>Knowledge Bot</b></div>
        <span onclick="gandhiBot.close()" style="margin-left:auto;cursor:pointer;font-size:20px">✕</span>
    </div>
    
    <div class="gandhi-bot-messages" id="gandhiMessages">
        <div class="gandhi-bot-msg bot">
            🙏 <b>Namaste!</b> Ask me about Gandhi's writings.<br>
            <small>🎤 Click EN | हि | ગુ to speak</small>
        </div>
        <div class="gandhi-bot-suggestions" id="gandhiSuggestions">
            <button onclick="gandhiBot.ask('What is Satyagraha?')">Satyagraha?</button>
            <button onclick="gandhiBot.ask('What is Ahimsa?')">Ahimsa?</button>
            <button onclick="gandhiBot.ask('Where did Dandi March start?')">Dandi March?</button>
            <button onclick="gandhiBot.ask('What is Hind Swaraj?')">Hind Swaraj?</button>
        </div>
    </div>
    
    <div class="gandhi-bot-input">
        <button onclick="speak('en-IN')" style="background:#e74c3c;color:white;border:none;border-radius:50%;width:36px;height:36px;min-width:36px;font-size:12px;cursor:pointer;font-weight:bold;">EN</button>
        <button onclick="speak('hi-IN')" style="background:#e67e22;color:white;border:none;border-radius:50%;width:36px;height:36px;min-width:36px;font-size:12px;cursor:pointer;font-weight:bold;">हि</button>
        <button onclick="speak('gu-IN')" style="background:#9b59b6;color:white;border:none;border-radius:50%;width:36px;height:36px;min-width:36px;font-size:12px;cursor:pointer;font-weight:bold;">ગુ</button>
        <input type="text" id="gandhiInput" placeholder="Type your question..." onkeypress="if(event.key==='Enter')gandhiBot.send()">
        <button onclick="gandhiBot.send()">➤</button>
    </div>
    
    <div class="gandhi-bot-branding">Powered by AI • Library data only</div>
</div>

<script>
// Voice function
function speak(lang) {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice works only in Chrome.'); return; }
    
    var r = new SR();
    r.lang = lang;
    
    r.onstart = function() { console.log('Listening: ' + lang); };
    r.onerror = function(e) { 
        if (e.error === 'not-allowed') alert('Allow microphone in browser settings.');
        else if (e.error === 'network') alert('Need internet for voice.');
        else console.log('Voice error:', e.error);
    };
    r.onresult = function(e) {
        document.getElementById('gandhiInput').value = e.results[0][0].transcript;
        gandhiBot.send();
    };
    r.start();
}

// Bot
const gandhiBot = {
    apiUrl: 'http://localhost:8000/ask',
    isOpen: false,
    
    toggle: function() {
        var w = document.getElementById('gandhiBotWindow');
        this.isOpen = !this.isOpen;
        if (this.isOpen) { w.classList.add('open'); document.getElementById('gandhiInput').focus(); }
        else { w.classList.remove('open'); }
    },
    
    close: function() {
        document.getElementById('gandhiBotWindow').classList.remove('open');
        this.isOpen = false;
    },
    
    ask: function(q) {
        document.getElementById('gandhiInput').value = q;
        this.send();
    },
    
    send: async function() {
        var input = document.getElementById('gandhiInput');
        var q = input.value.trim();
        if (!q) return;
        
        var msgs = document.getElementById('gandhiMessages');
        var sug = document.getElementById('gandhiSuggestions');
        if (sug) sug.style.display = 'none';
        
        msgs.innerHTML += '<div class="gandhi-bot-msg user">' + q + '</div>';
        
        var tid = 't' + Date.now();
        msgs.innerHTML += '<div class="gandhi-bot-msg bot" id="' + tid + '"><div class="gandhi-bot-typing"><span></span><span></span><span></span></div></div>';
        
        input.value = '';
        msgs.scrollTop = msgs.scrollHeight;
        
        try {
            var res = await fetch(this.apiUrl, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: q})
            });
            var data = await res.json();
            
            document.getElementById(tid)?.remove();
            
            var src = '';
            if (data.sources && data.sources.length > 0) {
                src = '<div class="src">📚 ';
                data.sources.forEach(function(s) { src += '📖 ' + s.book + ' (Pg ' + s.page + ') | '; });
                src += '</div>';
            }
            
            msgs.innerHTML += '<div class="gandhi-bot-msg bot">' + data.answer + src + '</div>';
        } catch(err) {
            document.getElementById(tid)?.remove();
            msgs.innerHTML += '<div class="gandhi-bot-msg bot">❌ Server not reachable.<br><small>Run: uvicorn main:app --host 0.0.0.0 --port 8000</small></div>';
        }
        
        msgs.scrollTop = msgs.scrollHeight;
        input.focus();
    }
};
</script>

</body>
</html>
